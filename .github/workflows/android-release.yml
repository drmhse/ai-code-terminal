name: Android Release APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  apk:
    name: Build APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      ACT_API_BASE_URL: ${{ vars.ACT_API_BASE_URL }}
      AUTHOS_BASE_URL: ${{ vars.AUTHOS_BASE_URL }}
      AUTHOS_ORG_SLUG: ${{ vars.AUTHOS_ORG_SLUG }}
      AUTHOS_SERVICE_SLUG: ${{ vars.AUTHOS_SERVICE_SLUG }}
      AUTHOS_CLIENT_ID: ${{ vars.AUTHOS_CLIENT_ID }}
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Analyze Flutter frontend
        run: flutter analyze

      - name: Test Flutter frontend
        run: flutter test

      - name: Build Android APK
        run: |
          defines=()
          if [ -n "$ACT_API_BASE_URL" ]; then
            defines+=(--dart-define=ACT_API_BASE_URL="$ACT_API_BASE_URL")
          fi
          if [ -n "$AUTHOS_BASE_URL" ]; then
            defines+=(--dart-define=AUTHOS_BASE_URL="$AUTHOS_BASE_URL")
          fi
          if [ -n "$AUTHOS_ORG_SLUG" ]; then
            defines+=(--dart-define=AUTHOS_ORG_SLUG="$AUTHOS_ORG_SLUG")
          fi
          if [ -n "$AUTHOS_SERVICE_SLUG" ]; then
            defines+=(--dart-define=AUTHOS_SERVICE_SLUG="$AUTHOS_SERVICE_SLUG")
          fi
          if [ -n "$AUTHOS_CLIENT_ID" ]; then
            defines+=(--dart-define=AUTHOS_CLIENT_ID="$AUTHOS_CLIENT_ID")
          fi
          flutter build apk --release "${defines[@]}"

      - name: Prepare APK asset
        run: |
          mkdir -p ../release-assets
          cp build/app/outputs/flutter-apk/app-release.apk \
            "../release-assets/act-android-${RELEASE_TAG}.apk"

      - name: Generate release notes
        run: |
          previous_tag="$(
            git tag --list 'v*' --sort=-v:refname |
              grep -v "^${RELEASE_TAG}$" |
              head -n 1 || true
          )"

          if [ -n "$previous_tag" ]; then
            range="${previous_tag}..${RELEASE_TAG}"
            heading="Changes since \`${previous_tag}\`."
          else
            range="${RELEASE_TAG}"
            heading="Initial tagged release \`${RELEASE_TAG}\`."
          fi

          {
            echo "## Changelog"
            echo
            echo "$heading"
            echo
            git log --pretty='- `%h` %s (%an)' "$range"
          } > ../release-assets/release-notes.md

      - name: Require existing unified GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_api_url="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}"

          if ! curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -o ../release-assets/existing-release.json \
            "$release_api_url"; then
            echo "::error::No GitHub Release exists for ${RELEASE_TAG}. Publish the unified ACT release with backend assets first, then rerun this Android workflow."
            exit 1
          fi

          node <<'NODE'
          const fs = require('fs');

          const tag = process.env.RELEASE_TAG;
          const releasePath = '../release-assets/existing-release.json';
          const notesPath = '../release-assets/release-notes.md';
          const bodyPath = '../release-assets/release-body.md';
          const release = JSON.parse(fs.readFileSync(releasePath, 'utf8'));
          const assetNames = new Set((release.assets || []).map((asset) => asset.name));
          const requiredAssets = [
            `act-server-${tag}-linux-x86_64.tar.gz`,
            `act-server-${tag}-linux-aarch64.tar.gz`,
            'BACKEND_BINARY_LICENSE',
            'SHA256SUMS.txt',
          ];
          const missing = requiredAssets.filter((name) => !assetNames.has(name));

          if (missing.length > 0) {
            console.error(
              `Release ${tag} is missing backend release assets: ${missing.join(', ')}`
            );
            process.exit(1);
          }

          const notes = fs.readFileSync(notesPath, 'utf8').trimEnd();
          const start = `<!-- act-release-changelog:${tag}:start -->`;
          const end = `<!-- act-release-changelog:${tag}:end -->`;
          const escapeRegExp = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const existingBlock = new RegExp(
            `${escapeRegExp(start)}[\\s\\S]*?${escapeRegExp(end)}\\n*`,
            'm'
          );
          const baseBody = (release.body || '').replace(existingBlock, '').trimEnd();

          fs.writeFileSync(bodyPath, `${baseBody}\n\n${start}\n${notes}\n${end}\n`);
          NODE

      - uses: actions/upload-artifact@v4
        with:
          name: act-android-apk
          path: release-assets/*.apk
          if-no-files-found: error

      - name: Attach APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: release-assets/*.apk
          body_path: release-assets/release-body.md
