services:
  act:
    build:
      context: .
      dockerfile: Dockerfile.optimized
    container_name: act_rust_backend
    restart: unless-stopped

    # ports:
      # - "${PORT:-3001}:${ACT_SERVER_PORT:-3001}"

    # Environment variables using the same convention as Node version
    # but mapping to Rust backend's expected variable names
    environment:
      # Server Configuration
      - ACT_SERVER_HOST=0.0.0.0
      - ACT_SERVER_PORT=${PORT:-3001}

      # Database Configuration
      - ACT_DATABASE_URL=${ACT_DATABASE_URL:-sqlite:./data/act.db}
      - ACT_DATABASE_MAX_CONNECTIONS=10

      # SSO Configuration (all authentication is now handled via SSO)
      # SSO server handles client identification automatically via org and service slugs
      - ACT_SSO_BASE_URL=${ACT_SSO_BASE_URL}
      - ACT_SSO_ORG_SLUG=${ACT_SSO_ORG_SLUG}
      - ACT_SSO_SERVICE_SLUG=${ACT_SSO_SERVICE_SLUG}
      - ACT_SSO_JWKS_URL=${ACT_SSO_JWKS_URL}

      # CORS Configuration
      - ACT_CORS_ALLOWED_ORIGINS=${ACT_CORS_ALLOWED_ORIGINS:-https://localhost:3002,http://localhost:3002,https://waterproof-outsourcing-spies-even.trycloudflare.com}
      - ACT_CORS_ALLOWED_HEADERS=content-type,authorization,x-requested-with

      # Microsoft To-Do Integration (Token Caching)
      # OAuth is handled by SSO - this key is only for caching provider tokens
      - MS_ENCRYPTION_KEY=${MS_ENCRYPTION_KEY}

      # Logging Configuration
      - RUST_LOG=${LOG_LEVEL:-act_server=info,act_core=info}
      - ALLOW_ACCESS_TO_PARENT_DIRS=false

      # Additional environment indicators
      - RUST_ENV=${NODE_ENV:-development}

    volumes:
      - act_rust_data:/app/data  # Persist SQLite DB
      - act_rust_workspaces:/app/workspaces  # Persist workspaces for PTY
      - act_rust_logs:/app/logs  # Logs

    # Resource limits for consistency with Node version
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.1'

    stdin_open: true
    tty: true
    working_dir: /app

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${ACT_SERVER_PORT:-3001}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  caddy:
      image: caddy:2-alpine
      container_name: act_caddy
      restart: unless-stopped
      ports:
        # Expose standard web ports
        - "80:80"
        - "443:443"
        - "443:443/udp" # For HTTP/3
        - "3002:3002"
      volumes:
        # Mount the Caddyfile for configuration
        - ./Caddyfile:/etc/caddy/Caddyfile
        # Mount the built frontend 'dist' directory
        - ../frontend/dist:/srv/frontend
        # Caddy needs persistent volumes for certificates and state
        - caddy_data:/data
        - caddy_config:/config

# Define volumes consistent with Node version naming
volumes:
  act_rust_data:
  act_rust_workspaces:
  act_rust_logs:
  caddy_data:
  caddy_config:
